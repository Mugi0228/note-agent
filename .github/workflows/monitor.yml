name: Anthropic監視 → note下書き自動生成

on:
  schedule:
    # 毎朝8時（JST）= UTC 23時（前日）
    - cron: "0 23 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存関係インストール
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: パイプライン実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: |
          cd src
          python main.py

      - name: last_seen.jsonをコミット（差分管理）
        run: |
          git config user.name "note-agent[bot]"
          git config user.email "note-agent@users.noreply.github.com"
          git add data/last_seen.json
          git diff --cached --quiet || git commit -m "chore: update last_seen $(date +'%Y-%m-%d')"
          git push
